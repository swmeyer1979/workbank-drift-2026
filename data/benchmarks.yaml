# April-2026 frontier benchmark snapshots.
#
# Every entry must cite a primary source (vendor model card, leaderboard page,
# official paper). If a score is unavailable, leave null and document `status`.
# Screenshots of each source land in data/benchmark_snapshots/<benchmark>/<model>.png
# with the retrieval date in the filename.
#
# NEVER fabricate. Empty cell beats guessed cell. Raters treat null as "no anchor".

retrieval_date: 2026-04-24

# IMPORTANT: numbers below were extracted from third-party aggregator articles,
# not primary vendor model cards. Before publishing, every score must be
# re-verified against Anthropic / Google / OpenAI's own model-card page and
# a dated screenshot archived in data/benchmark_snapshots/.
# Berkeley RDI (2026) showed several agent benchmarks are exploitable to
# near-perfect scores without solving tasks — treat agent benchmarks with caution.

models:
  claude_opus_4_7:
    vendor: Anthropic
    card: https://www.anthropic.com/claude/opus
  gemini_3_pro:
    vendor: Google
    card: https://deepmind.google/technologies/gemini/pro/
  gpt_5_5:
    vendor: OpenAI
    card: https://openai.com/index/gpt-5/

benchmarks:

  swe_bench_verified:
    description: "500 human-validated GitHub issues; resolve-rate with agent harness."
    task_families: [software_engineering]
    scores:
      claude_opus_4_7: { score: 87.6, source: "vellum.ai/blog/claude-opus-4-7-benchmarks-explained",    status: unverified }
      gemini_3_pro:    { score: 76.2, source: "vellum.ai/blog/google-gemini-3-benchmarks",               status: unverified }
      gpt_5_5:         { score: 88.7, source: "tokenmix.ai/blog/gpt-5-5-spud-review (Apr 2026)",         status: unverified }

  swe_bench_pro:
