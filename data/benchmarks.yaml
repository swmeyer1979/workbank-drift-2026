# Methodology caveat — cite in README:
#   Berkeley RDI (2026) found SWE-bench Verified, Terminal-Bench, WebArena, and GAIA
#   can be gamed to near-perfect scores without solving underlying tasks. Agent-family
#   anchors (SWE-bench, OSWorld, WebArena, GAIA) should be interpreted as upper bounds.

# Task-family → rubric-cap rules (no benchmark can score these above the cap):
family_caps:
  physical_embodied: 2           # no dexterous embodiment at frontier 2026-04
  continuous_interpersonal: 3    # voice agents exist but sustained empathy unproven
  safety_critical_unsupervised: 3
